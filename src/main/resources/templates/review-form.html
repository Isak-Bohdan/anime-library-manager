<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta charset="UTF-8">
    <title>Додати відгук</title>
</head>
<body>

<div class="header">
    <div><strong>AnimeTracker</strong></div>

    <div class="nav">
        <a href="/">Home</a>
        <a href="/titles">Titles</a>
        <a href="/categories">Categories</a>
        <a href="/search">Search</a>
    </div>
</div>

<h1>Додати відгук для: <span th:text="${title.title}"></span></h1>

<a th:href="@{/titles/{id}/reviews(id=${title.id})}">Назад до відгуків</a>

<form th:action="@{/titles/{id}/reviews(id=${title.id})}"
      th:object="${reviewForm}"
      method="post">
    <div>
        <label for="reviewText">Текст відгуку:</label>
        <textarea id="reviewText" th:field="*{reviewText}" required></textarea>
    </div>

    <div>
        <label for="score">Оцінка:</label>
        <input type="number" id="score" th:field="*{score}" min="1" max="10">
    </div>

    <div>
        <button type="submit">Зберегти</button>
    </div>
</form>
</body>
</html>
