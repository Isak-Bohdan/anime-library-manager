<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categories</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="header">
    <div class="logo">AnimeTracker</div>
    <div class="nav">
        <a href="/">Home</a>
        <a href="/titles">Titles</a>
        <a href="/categories">Categories</a>
        <a href="/search">Search</a>
    </div>
</div>

<div class="container">
    <h1 class="page-title">Categories</h1>
    <p class="page-subtitle">Manage default and custom categories for your titles.</p>

    <div class="actions-row">
        <a href="/categories/new" class="btn btn-primary">Add Category</a>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}"></td>
                <td th:text="${category.name}"></td>
                <td th:text="${category.description}"></td>
                <td>
                    <div th:if="${!defaultCategoryNames.contains(category.name)}" class="actions-row" style="margin:0;">
                        <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="btn btn-secondary btn-small">Edit</a>

                        <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post" class="inline-form">
                            <button class="btn btn-danger btn-small" type="submit">Delete</button>
                        </form>
                    </div>

                    <span th:if="${defaultCategoryNames.contains(category.name)}" class="muted">
                        Default category
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
